# Docker Compose - Produção (sem Nginx/Certbot no Docker)
# Nginx do HOST faz proxy para http://127.0.0.1:8003

services:
  postgres:
    image: postgres:15-alpine
    container_name: wifi-portal-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - wifi-portal-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: wifi-portal-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    # IMPORTANTE: usar $$ para a variável ser expandida NO CONTAINER (não no host)
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["sh", "-lc", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\" --maxmemory 200mb --maxmemory-policy allkeys-lru"]
    networks:
      - wifi-portal-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wifi-portal-app
    # Expor SOMENTE local para o Nginx do host (proxy_pass)
    ports:
      - "127.0.0.1:8003:5000"
    env_file:
      - .env.local
    environment:
      # Aqui pode ficar com ${REDIS_PASSWORD} pq o Compose vai resolver via env_file
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - wifi-portal-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; r=requests.get('http://localhost:5000/healthz', timeout=3); raise SystemExit(0 if r.ok else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  postgres_data:
  redis_data:

networks:
  wifi-portal-network:
    driver: bridge

